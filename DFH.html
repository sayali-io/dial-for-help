<head>
<meta charset="UTF-8">
<title>Dial For Help</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

/* Background */

body{
background:linear-gradient(120deg,#2193b0,#6dd5ed);
color:white;
text-align:center;
}

/* HOME PAGE */

#home{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#home h1{
font-size:60px;
margin-bottom:20px;
letter-spacing:2px;
}

#home p{
font-size:20px;
margin-bottom:30px;
}

.mainBtn{
padding:15px 40px;
font-size:20px;
border:none;
border-radius:30px;
background:white;
color:#2193b0;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.mainBtn:hover{
transform:scale(1.05);
}

/* SERVICES PAGE */

#services{
display:none;
padding:40px;
}

/* Tabs */

.tabs{
margin-bottom:30px;
}

.tabs button{
background:white;
border:none;
padding:10px 20px;
margin:5px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
color:#2193b0;
transition:0.3s;
}

.tabs button:hover{
background:#f1f1f1;
}

/* Cards */

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
}

.card{
background:white;
color:black;
padding:25px;
width:220px;
border-radius:12px;
box-shadow:0 8px 15px rgba(0,0,0,0.2);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.icon{
font-size:45px;
margin-bottom:10px;
}

.card h3{
color:#2193b0;
margin-bottom:10px;
}

.call{
display:inline-block;
margin-top:10px;
padding:8px 15px;
background:#2193b0;
color:white;
border-radius:20px;
text-decoration:none;
}

.call:hover{
background:#176d87;
}

</style>
</head>

<body>

<!-- HOME PAGE -->

<div id="home">

<h1>Dial For Help</h1>
<p>Your quick solution for home services</p>

<button class="mainBtn" onclick="openServices()">Dial For Help</button>

</div>


<!-- SERVICES PAGE -->

<div id="services">

<div class="tabs">
<button onclick="showTab('electrician')">Electrician</button>
<button onclick="showTab('plumber')">Plumber</button>
<button onclick="showTab('carpenter')">Carpenter</button>
<button onclick="showTab('gas')">Gas Repair</button>
<button onclick="showTab('cleaning')">House Cleaning</button>
<button onclick="showTab('gardening')">Gardening</button>
</div>


<!-- Electrician -->

<div id="electrician" class="container tab">

<div class="card">
<div class="icon">⚡</div>
<h3>Raj Electric</h3>
<p>📞 9876543210</p>
<a class="call" href="tel:9876543210">Call</a>
</div>

<div class="card">
<div class="icon">💡</div>
<h3>PowerFix</h3>
<p>📞 9823456789</p>
<a class="call" href="tel:9823456789">Call</a>
</div>

</div>


<!-- Plumber -->

<div id="plumber" class="container tab" style="display:none;">

<div class="card">
<div class="icon">🚿</div>
<h3>Aman Plumbing</h3>
<p>📞 9812345678</p>
<a class="call" href="tel:9812345678">Call</a>
</div>

</div>


<!-- Carpenter -->

<div id="carpenter" class="container tab" style="display:none;">

<div class="card">
<div class="icon">🪚</div>
<h3>WoodCraft</h3>
<p>📞 9898989898</p>
<a class="call" href="tel:9898989898">Call</a>
</div>

</div>


<!-- Gas Repair -->

<div id="gas" class="container tab" style="display:none;">

<div class="card">
<div class="icon">🔥</div>
<h3>GasFix</h3>
<p>📞 9777777777</p>
<a class="call" href="tel:9777777777">Call</a>
</div>

</div>


<!-- Cleaning -->

<div id="cleaning" class="container tab" style="display:none;">

<div class="card">
<div class="icon">🧹</div>
<h3>CleanHome</h3>
<p>📞 9666666666</p>
<a class="call" href="tel:9666666666">Call</a>
</div>

</div>


<!-- Gardening -->

<div id="gardening" class="container tab" style="display:none;">

<div class="card">
<div class="icon">🌿</div>
<h3>Green Gardeners</h3>
<p>📞 9555555555</p>
<a class="call" href="tel:9555555555">Call</a>
</div>

</div>

</div>


<script>

function openServices(){
document.getElementById("home").style.display="none";
document.getElementById("services").style.display="block";
}

function showTab(tabName){

let tabs=document.getElementsByClassName("tab");

for(let i=0;i<tabs.length;i++){
tabs[i].style.display="none";
}

document.getElementById(tabName).style.display="flex";

}

</script>

</body>
</html>
